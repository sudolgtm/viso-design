            <script defer="" data-name="navigation-logic">
              document.addEventListener('DOMContentLoaded', function() {
                (function(){
                  const menuOpenBtn = document.getElementById("mobile-menu-open")
                  const menuCloseBtn = document.getElementById("mobile-menu-close")
                  const mobileOverlay = document.getElementById("mobile-overlay")
                  const body = document.body

                  const toggleMenu = (isOpen) => {
                    if (isOpen) {
                      mobileOverlay.style.display = "flex"
                      setTimeout(() => {
                        mobileOverlay.classList.add("is-active")
                        menuOpenBtn.setAttribute("aria-expanded", "true")
                        body.style.overflow = "hidden"
                      }, 10)
                    } else {
                      mobileOverlay.classList.remove("is-active")
                      menuOpenBtn.setAttribute("aria-expanded", "false")
                      body.style.overflow = ""
                      setTimeout(() => {
                        if (!mobileOverlay.classList.contains("is-active")) {
                          mobileOverlay.style.display = "none"
                        }
                      }, 400)
                    }
                  }

                  menuOpenBtn.addEventListener("click", () => toggleMenu(true))
                  menuCloseBtn.addEventListener("click", () => toggleMenu(false))

                  const mobileLinks = mobileOverlay.querySelectorAll(".navigation-mobile-link")
                  mobileLinks.forEach((link) => {
                    link.addEventListener("click", () => toggleMenu(false))
                  })

                  window.addEventListener("resize", () => {
                    if (window.innerWidth > 767 && mobileOverlay.classList.contains("is-active")) {
                      toggleMenu(false)
                    }
                  })

                  let lastScroll = 0
                  const navWrapper = document.querySelector(".navigation-wrapper")

                  window.addEventListener("scroll", () => {
                    const currentScroll = window.pageYOffset

                    if (currentScroll <= 0) {
                      navWrapper.style.boxShadow = "none"
                      return
                    }

                    if (currentScroll > lastScroll && currentScroll > 100) {
                      navWrapper.style.transform = "translateY(-100%)"
                    } else {
                      navWrapper.style.transform = "translateY(0)"
                      navWrapper.style.boxShadow = "0 4px 20px rgba(0, 0, 0, 0.05)"
                    }

                    lastScroll = currentScroll
                  })
                })()
              });
            </script>
          </div>
        </div>
